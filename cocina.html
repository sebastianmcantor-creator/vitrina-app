<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cocina — Pedidos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: 'DM Sans', sans-serif; color: #f0f0f0; min-height: 100vh; }

    .header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title { font-size: 18px; font-weight: 600; }
    .header-sub { font-size: 12px; color: #666; margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff4444; display: inline-block; margin-right: 6px;
    }
    .status-dot.connected { background: #44cc66; }

    .conn-label { font-size: 12px; color: #888; display: flex; align-items: center; }

    .boards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .pedido-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pedido-card.listo { border-color: #1a4a2a; opacity: 0.6; }

    .pedido-header {
      background: #222;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .mesa-label { font-size: 16px; font-weight: 600; }
    .pedido-hora { font-size: 12px; color: #888; }
    .pedido-id { font-size: 11px; color: #555; }

    .pedido-items { padding: 14px 16px; }

    .pedido-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 14px;
    }

    .pedido-item:last-child { border-bottom: none; }
    .item-qty { color: #c8a84a; font-weight: 600; margin-right: 8px; }
    .item-name-cocina { flex: 1; }

    .pedido-footer { padding: 12px 16px; border-top: 1px solid #2a2a2a; }

    .estado-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .estado-btn.pendiente { background: #c8a84a; color: #0f0f0f; }
    .estado-btn.preparando { background: #2255cc; color: white; }
    .estado-btn.listo { background: #22aa44; color: white; }
    .estado-btn:active { opacity: 0.8; }

    .estado-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 8px;
      font-weight: 500;
    }

    .badge-pendiente { background: #3a2e00; color: #c8a84a; }
    .badge-preparando { background: #001a44; color: #6699ff; }
    .badge-listo { background: #002211; color: #44cc66; }

    .empty-state {
      text-align: center;
      color: #444;
      padding: 80px 20px;
      font-size: 15px;
      grid-column: 1 / -1;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    .nuevo-badge {
      background: #c8553d;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      margin-left: 6px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .undo-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .undo-btn:not(:disabled):hover {
      background: #333;
      border-color: #c8a84a;
      color: #c8a84a;
    }

    .undo-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .undo-detail {
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🍳 Panel de Cocina</div>
    <div class="header-sub">La Panera Rosa — Pedidos en tiempo real</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div>
      <button class="undo-btn" id="undo-btn" disabled onclick="deshacerUltimoCambio()">
        ↩ Deshacer
      </button>
      <div class="undo-detail" id="undo-detail"></div>
    </div>
    <div class="conn-label">
      <span class="status-dot" id="status-dot"></span>
      <span id="conn-label">Conectando...</span>
    </div>
  </div>
</div>

<div class="boards" id="boards">
  <div class="empty-state">
    <div class="empty-icon">🍽️</div>
    Esperando pedidos...<br>Los pedidos aparecen acá en tiempo real.
  </div>
</div>

<script>
  const API = 'https://vitrina-worker.vitrinaapp.workers.dev';

  let pedidos = {};
  let historial = [];

  // ── Status indicator ─────────────────────────────────────────────────────────
  function setStatus(online) {
    document.getElementById('status-dot').classList.toggle('connected', online);
    document.getElementById('conn-label').textContent = online ? 'En línea' : 'Sin conexión';
  }

  // ── Undo button ──────────────────────────────────────────────────────────────
  function actualizarBotonDeshacer() {
    const btn = document.getElementById('undo-btn');
    const detail = document.getElementById('undo-detail');
    if (historial.length === 0) {
      btn.disabled = true;
      detail.textContent = '';
    } else {
      const ultimo = historial[historial.length - 1];
      const labels = { pendiente: 'Pendiente', preparando: 'Preparando', listo: 'Listo' };
      btn.disabled = false;
      detail.textContent = 'Mesa ' + ultimo.mesa + ' → ' + labels[ultimo.estadoAnterior];
    }
  }

  // ── Polling ──────────────────────────────────────────────────────────────────
  async function fetchPedidos() {
    try {
      const res = await fetch(API + '/pedidos');
      if (!res.ok) throw new Error();
      const lista = await res.json();

      const nuevos = lista.filter(p => !pedidos[p.id] && p.estado === 'pendiente');
      if (nuevos.length > 0) playSound();

      pedidos = {};
      lista
        .filter(p => p.estado !== 'entregado')
        .forEach(p => { pedidos[p.id] = p; });

      setStatus(true);
      renderAll();
    } catch {
      setStatus(false);
    }
  }

  // ── Sound ────────────────────────────────────────────────────────────────────
  function playSound() {
    try {
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  // ── State helpers ────────────────────────────────────────────────────────────
  function siguienteEstado(estado) {
    if (estado === 'pendiente') return 'preparando';
    if (estado === 'preparando') return 'listo';
    return 'listo';
  }

  function labelEstado(estado) {
    if (estado === 'pendiente') return '▶ Empezar a preparar';
    if (estado === 'preparando') return '✓ Marcar como listo';
    return '✓ Listo';
  }

  // ── Cambiar estado → PUT /pedidos/:id/estado ─────────────────────────────────
  async function cambiarEstado(id) {
    const pedido = pedidos[id];
    if (!pedido || pedido.estado === 'listo') return;
    const estadoAnterior = pedido.estado;
    const nuevoEstado = siguienteEstado(pedido.estado);

    const res = await fetch(API + '/pedidos/' + id + '/estado', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ estado: nuevoEstado })
    });
    if (!res.ok) return;

    pedidos[id] = { ...pedido, estado: nuevoEstado };
    historial.push({ id, estadoAnterior, mesa: pedido.mesa });
    actualizarBotonDeshacer();
    renderAll();
  }

  // ── Deshacer → PUT /pedidos/:id/estado con estado anterior ───────────────────
  async function deshacerUltimoCambio() {
    if (historial.length === 0) return;
    const { id, estadoAnterior } = historial.pop();

    const res = await fetch(API + '/pedidos/' + id + '/estado', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ estado: estadoAnterior })
    });
    if (res.ok) {
      const updated = await res.json();
      pedidos[id] = updated;
      renderAll();
    }
    actualizarBotonDeshacer();
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function badgeEstado(estado) {
    const labels = { pendiente: '⏳ Pendiente', preparando: '🔥 Preparando', listo: '✅ Listo' };
    const classes = { pendiente: 'badge-pendiente', preparando: 'badge-preparando', listo: 'badge-listo' };
    return '<span class="estado-badge ' + classes[estado] + '">' + labels[estado] + '</span>';
  }

  function formatHora(iso) {
    try { return new Date(iso).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }); }
    catch { return iso; }
  }

  function renderAll() {
    const boards = document.getElementById('boards');
    const lista = Object.values(pedidos).sort((a, b) => b.id - a.id);

    if (lista.length === 0) {
      boards.innerHTML = '<div class="empty-state"><div class="empty-icon">🍽️</div>Esperando pedidos...<br>Los pedidos aparecen acá en tiempo real.</div>';
      return;
    }

    boards.innerHTML = lista.map(p => {
      const esNuevo = p.estado === 'pendiente' && (Date.now() - new Date(p.hora).getTime()) < 30000;
      return '<div class="pedido-card ' + (p.estado === 'listo' ? 'listo' : '') + '" id="card-' + p.id + '">' +
        '<div class="pedido-header">' +
          '<div>' +
            '<div class="mesa-label">Mesa ' + p.mesa + (esNuevo ? '<span class="nuevo-badge">NUEVO</span>' : '') + '</div>' +
            '<div class="pedido-id">Pedido #' + p.id + '</div>' +
          '</div>' +
          '<div style="text-align:right">' +
            badgeEstado(p.estado) +
            '<div class="pedido-hora" style="margin-top:4px">' + formatHora(p.hora) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="pedido-items">' +
          p.items.map(item =>
            '<div class="pedido-item">' +
              '<span class="item-qty">x' + item.qty + '</span>' +
              '<span class="item-name-cocina">' + item.name + '</span>' +
            '</div>'
          ).join('') +
        '</div>' +
        (p.estado !== 'listo' ?
          '<div class="pedido-footer">' +
            '<button class="estado-btn ' + p.estado + '" onclick="cambiarEstado(' + p.id + ')">' +
              labelEstado(p.estado) +
            '</button>' +
          '</div>' : '') +
      '</div>';
    }).join('');
  }

  // ── Start ────────────────────────────────────────────────────────────────────
  fetchPedidos();
  setInterval(fetchPedidos, 10000);
</script>
</body>
</html>
