<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrina — Ingresar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:        #1C1612;
  --terra:      #B85A30;
  --terra2:     #D4724E;
  --terra-pale: #F2E6DF;
  --gold:       #C8963C;
  --gold-pale:  #FAF3E4;
  --cream:      #F7F2EA;
  --cream2:     #EDE5D8;
  --white:      #FDFAF6;
  --muted:      #8A7E74;
  --border:     #DDD5C8;
  --card:       #FEFCF8;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  min-height: 100vh;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  background: var(--cream);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* fondo sutil */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(184,90,48,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,90,48,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.container {
  position: relative; z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

/* ── Logo / marca ── */
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
}
.brand-icon {
  width: 56px; height: 56px;
  background: var(--terra);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}
.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--ink);
}
.brand-tagline {
  font-size: 13.5px;
  color: var(--muted);
  font-weight: 300;
}

/* ── Card ── */
.card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  box-shadow: 0 2px 16px rgba(28,22,18,.06);
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  text-align: center;
  color: var(--ink);
}
.card-subtitle {
  font-size: 13.5px;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
  margin-top: -16px;
}

/* ── Botón Google ── */
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 14px 20px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  text-decoration: none;
}
.btn-google:hover {
  border-color: var(--terra);
  box-shadow: 0 2px 12px rgba(184,90,48,.12);
}
.btn-google:active { transform: scale(0.985); }
.btn-google:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
}
.google-icon {
  width: 20px; height: 20px; flex-shrink: 0;
}

/* ── Separador ── */
.divider {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--muted);
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

/* ── Mensaje de error ── */
.error-msg {
  display: none;
  background: #FFF0F0;
  border: 1px solid #F5C6C6;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: #B83030;
  text-align: center;
}
.error-msg.visible { display: block; }

/* ── Loader inline ── */
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--terra);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Footer ── */
.footer {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
}
.footer a {
  color: var(--terra);
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">

  <div class="brand">
    <div class="brand-icon">🪟</div>
    <div class="brand-name">Vitrina</div>
    <div class="brand-tagline">Tu restaurante, siempre lleno.</div>
  </div>

  <div class="card">
    <div>
      <div class="card-title">Bienvenido</div>
      <div class="card-subtitle">Ingresá con tu cuenta de Google para gestionar tu restaurante.</div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <button class="btn-google" id="btn-google" onclick="handleGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar con Google
    </button>

    <div class="divider">o</div>

    <p class="card-subtitle" style="margin-top:0">
      ¿Todavía no tenés cuenta?<br>
      Ingresá con Google y te la creamos automáticamente.
    </p>
  </div>

  <div class="footer">
    Al ingresar aceptás los <a href="#">Términos de servicio</a><br>
    y la <a href="#">Política de privacidad</a> de Vitrina.
  </div>

</div>

<script type="module">
import { getUser, signInWithGoogle } from './lib/auth.js'

// Si ya está autenticado, ir directo al panel
;(async () => {
  const user = await getUser()
  if (user) window.location.replace('/panel.html')
})()

window.handleGoogleLogin = async function () {
  const btn = document.getElementById('btn-google')
  const errEl = document.getElementById('error-msg')

  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Conectando...'
  errEl.classList.remove('visible')

  try {
    await signInWithGoogle()
    // La redirección la maneja Supabase OAuth — no llega acá en flujo normal
  } catch (err) {
    errEl.textContent = err.message || 'No se pudo conectar con Google. Intentá de nuevo.'
    errEl.classList.add('visible')
    btn.disabled = false
    btn.innerHTML = `
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar con Google`
  }
}
</script>
</body>
</html>
