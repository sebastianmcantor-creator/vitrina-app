<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago confirmado</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fdf8f4; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 24px; padding: 40px 32px; text-align: center; max-width: 320px; width: 100%; border: 1px solid #ede8e2; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    .title { font-family: 'Playfair Display', serif; font-size: 22px; color: #1a1208; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #8a7a6a; line-height: 1.6; margin-bottom: 24px; }
    .mesa { font-size: 13px; color: #c8553d; font-weight: 500; margin-bottom: 24px; }
    .btn { display: block; background: #1a1208; color: #fdf8f4; border-radius: 14px; padding: 14px; text-decoration: none; font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <div class="title">¡Pago confirmado!</div>
    <div class="sub">Tu pedido ya está en cocina.<br>En breve te lo llevamos a la mesa.</div>
    <div class="mesa" id="mesa-label"></div>
    <a class="btn" id="volver-btn" href="menu.html">Ver el menú</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const mesa = params.get('mesa');
    if (mesa) {
      document.getElementById('mesa-label').textContent = 'Mesa ' + mesa;
      document.getElementById('volver-btn').href = 'menu.html?mesa=' + mesa;
    }
  </script>
</body>
</html>
