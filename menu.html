<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Menú</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fdf8f4;
      --surface: #ffffff;
      --border: #ede8e2;
      --text: #1a1208;
      --muted: #8a7a6a;
      --accent: #B85A30;
      --accent-light: color-mix(in srgb, var(--accent) 12%, white);
      --tag-veg: #e8f5e9; --tag-veg-text: #2e7d32;
      --tag-vegan: #e3f2fd; --tag-vegan-text: #1565c0;
      --tag-celiac: #fff8e1; --tag-celiac-text: #f57f17;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

    #loading, #error-view {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); font-size: 15px; gap: 10px; padding: 20px; text-align: center;
    }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .restaurant-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--accent); }
    .restaurant-sub { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
    .cart-btn { background: #1a1208; color: #fdf8f4; border: none; border-radius: 24px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 7px; }
    .cart-count { background: var(--accent); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }

    .cat-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; overflow-x: auto; scrollbar-width: none; }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .cat-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

    .content { padding: 0 0 120px; }
    .category-section { padding: 24px 16px 8px; }
    .category-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 400; margin-bottom: 4px; }
    .category-desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

    .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; }
    .item-card.item-unavailable { opacity: 0.5; }
    .item-img { width: 80px; height: 80px; border-radius: 10px; background: var(--accent-light); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
    .item-desc { font-size: 12.5px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px; }
    .tag-veg { background: var(--tag-veg); color: var(--tag-veg-text); }
    .tag-vegan { background: var(--tag-vegan); color: var(--tag-vegan-text); }
    .tag-celiac { background: var(--tag-celiac); color: var(--tag-celiac-text); }
    .tag-popular { background: #fce4ec; color: #c62828; }
    .tag-spicy { background: #fbe9e7; color: #bf360c; }
    .tag-new { background: #e8eaf6; color: #283593; }
    .item-bottom { display: flex; align-items: center; justify-content: space-between; }
    .item-price { font-size: 15px; font-weight: 500; }
    .add-btn { background: var(--accent); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; flex-shrink: 0; }
    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn { background: var(--border); border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); }
    .qty-num { font-size: 15px; font-weight: 500; min-width: 20px; text-align: center; }
    .divider { height: 1px; background: var(--border); margin: 8px 16px 0; }

    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; }
    .cart-overlay.open { display: block; }
    .cart-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; z-index: 201; max-height: 80vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; padding: 0 0 32px; }
    .cart-drawer.open { transform: translateY(0); }
    .cart-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .cart-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .cart-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; }
    .cart-close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; }
    .cart-items { padding: 12px 20px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; }
    .cart-item-name { font-size: 14px; font-weight: 500; flex: 1; }
    .cart-item-price { font-size: 14px; color: var(--muted); white-space: nowrap; }
    .cart-item-qty { display: flex; align-items: center; gap: 6px; }
    .cart-qty-btn { background: var(--border); border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cart-qty-num { font-size: 13px; font-weight: 500; min-width: 16px; text-align: center; }
    .cart-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 20px; }
    .cart-footer { padding: 16px 20px 0; border-top: 1px solid var(--border); }
    .cart-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 500; margin-bottom: 14px; }
    .checkout-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: 14px; padding: 15px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
    .checkout-btn:disabled { opacity: 0.6; }

    .mozo-fab { position: fixed; bottom: 24px; right: 20px; background: #1a1208; color: #fdf8f4; border: none; border-radius: 28px; padding: 12px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 7px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 150; text-decoration: none; }

    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; }
    .confirm-overlay.open { display: flex; }
    .confirm-box { background: #fff; border-radius: 20px; padding: 24px 20px; max-width: 360px; margin: 20px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
    .confirm-heading { font-family: 'Playfair Display', serif; font-size: 17px; color: #1a1208; margin-bottom: 4px; }
    .confirm-mesa-label { font-size: 12px; color: #8a7a6a; margin-bottom: 16px; }
    .confirm-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .confirm-pedido { border: 1px solid #ede8e2; border-radius: 12px; padding: 12px 14px; }
    .confirm-pedido.listo { border-color: #c8e6c9; background: #f9fff9; }
    .confirm-pedido-num { font-size: 11px; color: #8a7a6a; margin-bottom: 10px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
    .confirm-steps { display: flex; align-items: flex-start; justify-content: center; }
    .cstep { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 0 0 auto; }
    .cstep-dot { width: 32px; height: 32px; border-radius: 50%; background: #ede8e2; border: 2px solid #ede8e2; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: background 0.35s, border-color 0.35s; }
    .cstep-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cstep-dot.done { background: #4caf50; border-color: #4caf50; color: #fff; }
    .cstep-label { font-size: 11px; color: #bbb; white-space: nowrap; transition: color 0.35s; }
    .cstep-label.active { color: var(--accent); font-weight: 600; }
    .cstep-label.done { color: #4caf50; }
    .cstep-line { flex: 1; height: 2px; background: #ede8e2; margin-top: 15px; min-width: 16px; max-width: 40px; transition: background 0.35s; }
    .cstep-line.done { background: #4caf50; }
    .confirm-close { background: none; border: 1px solid #ede8e2; border-radius: 12px; padding: 10px 24px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #8a7a6a; cursor: pointer; transition: border-color 0.15s, color 0.15s; flex-shrink: 0; }
    .confirm-close:hover { border-color: #1a1208; color: #1a1208; }
  </style>
</head>
<body>

  <div id="loading">Cargando menú…</div>
  <div id="error-view" style="display:none">
    <div style="font-size:36px">😕</div>
    <div id="error-msg">No se encontró el menú.</div>
  </div>

  <div id="app" style="display:none">
    <div class="header">
      <div class="header-top">
        <div>
          <div class="restaurant-name" id="rest-name"></div>
          <div class="restaurant-sub" id="rest-sub"></div>
        </div>
        <button class="cart-btn" onclick="toggleCart()">
          🛒 Mi pedido
          <span class="cart-count" id="cart-count">0</span>
        </button>
      </div>
    </div>
    <nav class="cat-nav" id="cat-nav"></nav>
    <div class="content" id="content"></div>
  </div>

  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-handle"></div>
    <div class="cart-header">
      <div class="cart-title">Tu pedido</div>
      <button class="cart-close" onclick="toggleCart()">×</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty">Tu carrito está vacío 🛒</div>
    </div>
    <div class="cart-footer" id="cart-footer" style="display:none">
      <div class="cart-total"><span>Total</span><span id="cart-total">$0</span></div>
      <button class="checkout-btn" id="checkout-btn" onclick="checkout()">Confirmar pedido →</button>
    </div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-heading">Tus pedidos</div>
      <div class="confirm-mesa-label" id="confirm-mesa-label">Mesa —</div>
      <div class="confirm-list" id="confirm-list"></div>
      <button class="confirm-close" onclick="cerrarOverlay()">Cerrar</button>
    </div>
  </div>

  <a class="mozo-fab" id="mozo-fab" href="mozo.html">💬 Consultá al mozo</a>

  <script type="module">
    import { restaurants, orders, orderSessions, orderItems } from './lib/db.js'
    import { supabase } from './lib/supabase.js'

    const TAG_MAP = {
      veg:     { label: 'Vegetariano', cls: 'tag-veg' },
      vegan:   { label: 'Vegano',      cls: 'tag-vegan' },
      celiac:  { label: 'Sin TACC',    cls: 'tag-celiac' },
      popular: { label: '⭐ Popular',  cls: 'tag-popular' },
      spicy:   { label: '🌶️ Picante', cls: 'tag-spicy' },
      new:     { label: '🆕 Nuevo',    cls: 'tag-new' },
    }

    const params = new URLSearchParams(location.search)
    const slug = params.get('slug')
    const mesa = params.get('mesa') !== null ? Number(params.get('mesa')) : null

    let rest = null
    let itemsById = {}
    let catIds = []
    let cart = {}
    const SESSION_KEY = 'vitrina_orders_' + slug + '_' + (mesa ?? 'x')
    let pedidosSesion = JSON.parse(sessionStorage.getItem(SESSION_KEY) || '[]')
    let statusInterval = null

    // ─── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      if (!slug) { showError('URL inválida — falta el parámetro slug.'); return }
      try {
        rest = await restaurants.getBySlug(slug)
      } catch {
        showError('No se encontró el menú. Verificá el enlace.')
        return
      }

      document.documentElement.style.setProperty('--accent', rest.primary_color || '#B85A30')
      document.title = rest.name + ' — Menú'
      document.getElementById('rest-name').textContent = rest.name
      const sub = [rest.tagline, rest.address].filter(Boolean).join(' · ')
      document.getElementById('rest-sub').textContent = sub || rest.city || ''
      document.getElementById('mozo-fab').href = 'mozo.html?slug=' + slug + '&mesa=' + (mesa ?? '')

      buildMenu()

      document.getElementById('loading').style.display = 'none'
      document.getElementById('app').style.display = 'block'

      if (pedidosSesion.length) abrirOverlayEstado()
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('error-msg').textContent = msg
      document.getElementById('error-view').style.display = 'flex'
    }

    // ─── Menu rendering ────────────────────────────────────────────────────────
    function buildMenu() {
      const cats = (rest.menu_categories || [])
        .filter(c => c.is_visible)
        .sort((a, b) => a.sort_order - b.sort_order)
      catIds = cats.map(c => c.id)

      cats.forEach(cat => {
        ;(cat.menu_items || []).forEach(item => { itemsById[item.id] = item })
      })

      document.getElementById('cat-nav').innerHTML = cats.map((cat, i) =>
        '<button class="cat-btn' + (i === 0 ? ' active' : '') + '" data-id="' + cat.id + '" onclick="navScroll(\'cat-' + cat.id + '\')">'
        + (cat.emoji ? cat.emoji + ' ' : '') + esc(cat.name) + '</button>'
      ).join('')

      document.getElementById('content').innerHTML = cats.map((cat, i) => {
        const items = (cat.menu_items || [])
          .filter(item => item.is_visible)
          .sort((a, b) => a.sort_order - b.sort_order)
        return '<div class="category-section" id="cat-' + cat.id + '">'
          + '<div class="category-title">' + (cat.emoji ? cat.emoji + ' ' : '') + esc(cat.name) + '</div>'
          + (cat.description ? '<div class="category-desc">' + esc(cat.description) + '</div>' : '')
          + items.map(itemCardHtml).join('')
          + '</div>'
          + (i < cats.length - 1 ? '<div class="divider"></div>' : '')
      }).join('')

      Object.keys(itemsById).forEach(renderCtrl)
    }

    function itemCardHtml(item) {
      const key = item.id.replace(/-/g, '_')
      const price = Number(item.price)
      const tags = (item.tags || []).map(t => {
        const m = TAG_MAP[t]
        return m ? '<span class="tag ' + m.cls + '">' + m.label + '</span>' : ''
      }).filter(Boolean).join('')
      const img = item.image_url
        ? '<img src="' + esc(item.image_url) + '" alt="" style="width:80px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0;">'
        : '<div class="item-img">' + (item.emoji || '🍽️') + '</div>'
      return '<div class="item-card' + (!item.is_available ? ' item-unavailable' : '') + '">'
        + img
        + '<div class="item-info">'
        + '<div class="item-name">' + esc(item.name)
        + (!item.is_available ? ' <span style="font-size:11px;color:#aaa;font-weight:400">(no disponible)</span>' : '')
        + '</div>'
        + (item.description ? '<div class="item-desc">' + esc(item.description) + '</div>' : '')
        + (tags ? '<div class="item-tags">' + tags + '</div>' : '')
        + '<div class="item-bottom">'
        + '<div class="item-price">$' + price.toLocaleString('es-AR') + '</div>'
        + '<div id="ctrl-' + key + '"></div>'
        + '</div></div></div>'
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }

    function renderCtrl(id) {
      const key = id.replace(/-/g, '_')
      const el = document.getElementById('ctrl-' + key)
      if (!el) return
      const item = itemsById[id]
      if (!item?.is_available) { el.innerHTML = ''; return }
      const qty = cart[id] || 0
      el.innerHTML = qty === 0
        ? '<button class="add-btn" onclick="addItem(\'' + id + '\')">+</button>'
        : '<div class="qty-control">'
          + '<button class="qty-btn" onclick="removeItem(\'' + id + '\')">−</button>'
          + '<span class="qty-num">' + qty + '</span>'
          + '<button class="qty-btn" onclick="addItem(\'' + id + '\')">+</button>'
          + '</div>'
    }

    // ─── Cart ──────────────────────────────────────────────────────────────────
    function addItem(id) {
      cart[id] = (cart[id] || 0) + 1
      renderCtrl(id)
      updateCartCount()
      if (document.getElementById('cart-drawer').classList.contains('open')) renderCartItems()
    }

    function removeItem(id) {
      if (!cart[id]) return
      cart[id]--
      if (!cart[id]) delete cart[id]
      renderCtrl(id)
      updateCartCount()
      if (document.getElementById('cart-drawer').classList.contains('open')) renderCartItems()
    }

    function updateCartCount() {
      document.getElementById('cart-count').textContent = Object.values(cart).reduce((a, b) => a + b, 0)
    }

    function toggleCart() {
      const drawer = document.getElementById('cart-drawer')
      const open = drawer.classList.contains('open')
      if (!open) renderCartItems()
      document.getElementById('cart-overlay').classList.toggle('open', !open)
      drawer.classList.toggle('open', !open)
    }

    function closeCart() {
      document.getElementById('cart-overlay').classList.remove('open')
      document.getElementById('cart-drawer').classList.remove('open')
    }

    function renderCartItems() {
      const container = document.getElementById('cart-items')
      const footer = document.getElementById('cart-footer')
      const ids = Object.keys(cart).filter(id => cart[id] > 0)
      if (!ids.length) {
        container.innerHTML = '<div class="cart-empty">Tu carrito está vacío 🛒</div>'
        footer.style.display = 'none'
        return
      }
      let total = 0
      container.innerHTML = ids.map(id => {
        const item = itemsById[id]
        const qty = cart[id]
        const sub = Number(item.price) * qty
        total += sub
        return '<div class="cart-item">'
          + '<div class="cart-item-name">' + esc(item.name) + '</div>'
          + '<div class="cart-item-qty">'
          + '<button class="cart-qty-btn" onclick="removeItem(\'' + id + '\')">−</button>'
          + '<span class="cart-qty-num">' + qty + '</span>'
          + '<button class="cart-qty-btn" onclick="addItem(\'' + id + '\')">+</button>'
          + '</div>'
          + '<div class="cart-item-price">$' + sub.toLocaleString('es-AR') + '</div>'
          + '</div>'
      }).join('')
      document.getElementById('cart-total').textContent = '$' + total.toLocaleString('es-AR')
      footer.style.display = 'block'
    }

    // ─── Checkout ──────────────────────────────────────────────────────────────
    async function checkout() {
      const ids = Object.keys(cart).filter(id => cart[id] > 0)
      if (!ids.length) return
      const btn = document.getElementById('checkout-btn')
      btn.textContent = 'Enviando...'
      btn.disabled = true
      try {
        const session = mesa != null ? await orderSessions.getOrCreate(rest.id, mesa) : null
        const total = ids.reduce((s, id) => s + Number(itemsById[id].price) * cart[id], 0)
        const order = await orders.create({
          restaurant_id: rest.id,
          session_id: session?.id ?? null,
          table_number: mesa ?? null,
          total,
        })
        await orderItems.createBatch(ids.map(id => ({
          order_id: order.id,
          menu_item_id: id,
          name: itemsById[id].name,
          price: Number(itemsById[id].price),
          quantity: cart[id],
        })))
        pedidosSesion.push(order.id)
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(pedidosSesion))
        closeCart()
        cart = {}
        updateCartCount()
        abrirOverlayEstado()
      } catch (e) {
        alert('Error al enviar el pedido. Intentá de nuevo.')
      }
      btn.textContent = 'Confirmar pedido →'
      btn.disabled = false
    }

    // ─── Order status overlay ──────────────────────────────────────────────────
    function statusStep(status) {
      if (status === 'pending' || status === 'confirmed') return 0
      if (status === 'preparing') return 1
      return 2
    }

    function pasoHtml(status) {
      const icons  = ['✓', '🍳', '🎉']
      const labels = ['Recibido', 'Preparando', 'Listo']
      const idx = statusStep(status)
      let html = '<div class="confirm-steps">'
      labels.forEach((label, i) => {
        const done = i < idx, active = i === idx
        html += '<div class="cstep">'
          + '<div class="cstep-dot' + (done ? ' done' : active ? ' active' : '') + '">' + icons[i] + '</div>'
          + '<div class="cstep-label' + (done ? ' done' : active ? ' active' : '') + '">' + label + '</div>'
          + '</div>'
        if (i < 2) html += '<div class="cstep-line' + (i < idx ? ' done' : '') + '"></div>'
      })
      return html + '</div>'
    }

    function renderConfirmList(lista) {
      document.getElementById('confirm-list').innerHTML = pedidosSesion.map(id => {
        const p = lista.find(x => x.id === id)
        if (!p) return ''
        const done = p.status === 'delivered' || p.status === 'cancelled'
        return '<div class="confirm-pedido' + (done ? ' listo' : '') + '">'
          + '<div class="confirm-pedido-num">Pedido #' + p.id.slice(-6).toUpperCase() + '</div>'
          + pasoHtml(p.status)
          + '</div>'
      }).filter(Boolean).join('')
    }

    function abrirOverlayEstado() {
      document.getElementById('confirm-mesa-label').textContent = mesa != null ? 'Mesa ' + mesa : 'Pedido a retirar'
      document.getElementById('confirm-overlay').classList.add('open')
      if (statusInterval) return
      async function poll() {
        if (!pedidosSesion.length) return
        try {
          const { data } = await supabase
            .from('orders')
            .select('id, status')
            .in('id', pedidosSesion)
          if (data) renderConfirmList(data)
        } catch {}
      }
      poll()
      statusInterval = setInterval(poll, 5000)
    }

    function cerrarOverlay() {
      clearInterval(statusInterval)
      statusInterval = null
      document.getElementById('confirm-overlay').classList.remove('open')
    }

    // ─── Cat nav scroll spy ────────────────────────────────────────────────────
    function navScroll(id) {
      const el = document.getElementById(id)
      if (!el) return
      window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' })
    }

    window.addEventListener('scroll', () => {
      let current = catIds[0]
      catIds.forEach(id => {
        const el = document.getElementById('cat-' + id)
        if (el && el.getBoundingClientRect().top < 110) current = id
      })
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.id === current)
      })
    })

    window.addItem = addItem
    window.removeItem = removeItem
    window.toggleCart = toggleCart
    window.checkout = checkout
    window.cerrarOverlay = cerrarOverlay
    window.navScroll = navScroll

    init()
  </script>
</body>
</html>
