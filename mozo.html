<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Chikpi — Asistente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #1a1208;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: #1a1208;
    }

    /* HEADER */
    .header {
      padding: 16px 20px 12px;
      border-bottom: 0.5px solid #2e2410;
      flex-shrink: 0;
    }

    .restaurant-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 500;
      color: #e8c87a;
      letter-spacing: 0.02em;
    }

    .table-badge {
      font-size: 11px;
      color: #8a7450;
      margin-top: 3px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5a9e6a;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: none;
    }

    .messages::-webkit-scrollbar { display: none; }

    .msg {
      max-width: 82%;
      font-size: 14px;
      line-height: 1.55;
    }

    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
    }

    .msg.bot .msg-bubble {
      background: #2a2010;
      color: #d4b97a;
      border-bottom-left-radius: 4px;
      border: 0.5px solid #3a2e1a;
    }

    .msg.user .msg-bubble {
      background: #c8a84a;
      color: #1a1208;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .msg-label {
      font-size: 10px;
      color: #5a4a2a;
      margin-bottom: 4px;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* TYPING */
    .typing {
      align-self: flex-start;
      display: none;
    }

    .typing .msg-bubble {
      background: #2a2010;
      border: 0.5px solid #3a2e1a;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c8a84a;
      opacity: 0.4;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }

    /* SUGGESTIONS */
    .suggestions {
      padding: 0 16px 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .suggestion-btn {
      background: #2a2010;
      border: 0.5px solid #4a3820;
      color: #c8a84a;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      padding: 7px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .suggestion-btn:hover { background: #3a2e18; }

    /* INPUT */
    .input-area {
      padding: 10px 14px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-top: 0.5px solid #2e2410;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: #2a2010;
      border: 0.5px solid #4a3820;
      border-radius: 22px;
      padding: 10px 16px;
      color: #e8c87a;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
    }

    .chat-input::placeholder { color: #5a4a2a; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #c8a84a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #e8c87a; }
    .send-btn:active { transform: scale(0.95); }

    .send-btn svg { width: 17px; height: 17px; }

    /* ERROR */
    .error-msg {
      font-size: 12px;
      color: #8a5a3a;
      text-align: center;
      padding: 4px 16px;
      display: none;
      flex-shrink: 0;
    }

    /* LOADING SPLASH */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #1a1208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      transition: opacity 0.5s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: #e8c87a;
      letter-spacing: 0.05em;
    }

    .loading-sub {
      font-size: 11px;
      color: #5a4a2a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .loading-bar {
      width: 100px;
      height: 1px;
      background: #2a2010;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: #c8a84a;
      width: 0%;
      animation: load 1.4s ease forwards;
    }

    @keyframes load { to { width: 100%; } }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loader">
    <div class="loading-logo">Chikpi</div>
    <div class="loading-sub">Cargando menú</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <div class="screen">
    <div class="header">
      <div class="restaurant-name">Chikpi</div>
      <div class="table-badge" id="table-badge">
        <span class="status-dot"></span>Asistente activo
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="msg-label">Mozo</div>
        <div class="msg-bubble">¡Hola! Bienvenido a Chikpi 🫒 Soy tu asistente. Puedo ayudarte con el menú, ingredientes, opciones vegetarianas, veganas o aptas para celíacos. ¿En qué te puedo ayudar?</div>
      </div>
      <div class="msg typing" id="typing">
        <div class="msg-bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('¿Qué opciones veganas tienen?')">Opciones veganas</button>
      <button class="suggestion-btn" onclick="sendSuggestion('¿Qué me recomendás para compartir?')">Para compartir</button>
      <button class="suggestion-btn" onclick="sendSuggestion('¿Tienen platos sin TACC?')">Sin TACC</button>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="input-area">
      <input class="chat-input" id="chat-input" type="text" placeholder="Preguntame lo que quieras..." />
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1208" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const BACKEND = 'https://proud-illumination-production-ed01.up.railway.app';

    const MENU = `
MENÚ DE CHIKPI — Restaurante de cocina mediterránea y de Medio Oriente. Ubicado en Colegiales, Buenos Aires.

ENTRADAS Y PARA COMPARTIR:
- Hummus clásico ($3.200): puré de garbanzos con tahini, limón y aceite de oliva. Apto vegano, celíaco.
- Hummus con carne ($4.100): hummus clásico con carne de res especiada. Apto celíaco.
- Baba ganoush ($3.000): berenjena asada, tahini, limón. Apto vegano, celíaco.
- Falafel (6 unidades, $3.500): croquetas de garbanzo y hierbas. Apto vegano. Contiene gluten.
- Fattoush ($2.800): ensalada mediterránea con tomate, pepino, menta y pan tostado. Apto vegano. Contiene gluten.
- Tabla mezze para dos ($7.200): hummus + baba ganoush + falafel + pita. Ideal para compartir. Contiene gluten.

PRINCIPALES:
- Shawarma de pollo ($4.800): pan pita, pollo marinado, vegetales, salsa de yogur. Contiene gluten y lácteos.
- Shawarma vegano ($4.200): pita, falafel, vegetales, tahini. Apto vegano. Contiene gluten.
- Bowl mediterráneo ($4.500): arroz, garbanzos, vegetales asados, tahini. Apto vegano, celíaco.
- Kofta de cordero ($5.200): brochette de cordero especiado con arroz y ensalada. Apto celíaco.
- Wrap de berenjenas ($3.900): berenjenas asadas, queso feta, hierbas. Vegetariano. Contiene gluten y lácteos.

POSTRES:
- Knafeh ($2.500): postre de queso con almíbar de rosas. Vegetariano. Contiene gluten y lácteos.
- Baklava (2 unidades, $1.800): hojaldre con nueces y miel. Vegetariano. Contiene gluten y frutos secos.
- Helado de tahini ($2.200): helado artesanal de sésamo. Vegetariano. Contiene lácteos.

BEBIDAS:
- Limonada de menta ($1.200): apto vegano, celíaco.
- Agua ($600).
- Vino de la casa (copa, $1.800).
- Té árabe ($900): con hierbas y especias. Apto vegano, celíaco.

INFORMACIÓN IMPORTANTE:
- Todos los platos se preparan en cocina compartida.
- Opciones celíacas: los platos marcados no contienen gluten en sus ingredientes, pero consultar por contaminación cruzada.
- El restaurante es pet-friendly en la vereda.
`;

    const SYSTEM_PROMPT = `Sos el asistente de Chikpi, un restaurante de cocina mediterránea y de Medio Oriente en Colegiales, Buenos Aires. Tu rol es el de un mozo digital amable, cálido y conocedor del menú.

REGLAS ESTRICTAS:
1. Solo respondés preguntas relacionadas con el menú, los platos, ingredientes, alérgenos, recomendaciones o información del restaurante.
2. Si te preguntan algo que no está en el menú o no tiene que ver con Chikpi, respondés amablemente que solo podés ayudar con el menú del restaurante.
3. Nunca inventés platos, precios ni información que no esté en el menú.
4. Usás un tono cálido, informal y porteño. Podés usar emojis con moderación.
5. Cuando recomendés, basate en lo que el cliente necesita (vegano, compartir, sin TACC, etc.).
6. Respondés en español rioplatense (vos, che, etc.).
7. Tus respuestas son concisas, máximo 3-4 líneas. Si hay lista, usá viñetas cortas.

MENÚ DISPONIBLE:
${MENU}`;

    let conversationHistory = [];
    let isLoading = false;

    // Leer número de mesa desde la URL: ?mesa=4
    const params = new URLSearchParams(window.location.search);
    const mesa = params.get('mesa');
    if (mesa) {
      document.getElementById('table-badge').innerHTML =
        '<span class="status-dot"></span>Mesa ' + mesa + ' · Asistente activo';
    }

    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 1600);

    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendSuggestion(text) {
      document.getElementById('chat-input').value = text;
      sendMessage();
    }

    function addMessage(role, text) {
      const messages = document.getElementById('messages');
      const typing = document.getElementById('typing');
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
      if (role === 'assistant') {
        div.innerHTML = '<div class="msg-label">Mozo</div><div class="msg-bubble">' + text.replace(/\n/g, '<br>') + '</div>';
      } else {
        div.innerHTML = '<div class="msg-bubble">' + text + '</div>';
      }
      messages.insertBefore(div, typing);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping(show) {
      document.getElementById('typing').style.display = show ? 'flex' : 'none';
      if (show) {
        const messages = document.getElementById('messages');
        messages.scrollTop = messages.scrollHeight;
      }
    }

    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      document.getElementById('suggestions').style.display = 'none';
      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });
      isLoading = true;
      showTyping(true);

      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';

      let attempts = 0;
      const maxAttempts = 3;

      while (attempts < maxAttempts) {
        try {
          const response = await fetch(BACKEND + '/api/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system: SYSTEM_PROMPT,
              messages: conversationHistory,
              max_tokens: 1000
            })
          });

          if (response.status === 529) {
            attempts++;
            if (attempts < maxAttempts) {
              errorEl.style.display = 'block';
              errorEl.textContent = 'Servidor ocupado, reintentando (' + attempts + '/' + maxAttempts + ')...';
              await new Promise(r => setTimeout(r, 3000));
              continue;
            }
          }

          if (!response.ok) throw new Error('Error ' + response.status);

          const data = await response.json();
          const reply = data.content?.[0]?.text || 'No pude procesar tu consulta. ¿Podés repetirla?';

          conversationHistory.push({ role: 'assistant', content: reply });
          showTyping(false);
          addMessage('assistant', reply);
          errorEl.style.display = 'none';
          break;

        } catch (err) {
          attempts++;
          if (attempts >= maxAttempts) {
            showTyping(false);
            addMessage('assistant', 'Ups, tuve un problema técnico. ¿Podés intentarlo de nuevo?');
          } else {
            await new Promise(r => setTimeout(r, 3000));
          }
        }
      }

      isLoading = false;
    }
  </script>
</body>
</html>
