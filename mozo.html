<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Asistente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1208; font-family: 'DM Sans', sans-serif; overflow: hidden; }

    .screen {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 480px; margin: 0 auto; background: #1a1208;
    }

    .header { padding: 16px 20px 12px; border-bottom: 0.5px solid #2e2410; flex-shrink: 0; }
    .restaurant-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: #e8c87a; letter-spacing: 0.02em; }
    .table-badge { font-size: 11px; color: #8a7450; margin-top: 3px; letter-spacing: 0.05em; text-transform: uppercase; }
    .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #5a9e6a; margin-right: 5px; vertical-align: middle; }

    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
    .messages::-webkit-scrollbar { display: none; }

    .msg { max-width: 82%; font-size: 14px; line-height: 1.55; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .msg-bubble { padding: 10px 14px; border-radius: 18px; }
    .msg.bot .msg-bubble { background: #2a2010; color: #d4b97a; border-bottom-left-radius: 4px; border: 0.5px solid #3a2e1a; }
    .msg.user .msg-bubble { background: #c8a84a; color: #1a1208; border-bottom-right-radius: 4px; font-weight: 500; }
    .msg-label { font-size: 10px; color: #5a4a2a; margin-bottom: 4px; padding-left: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

    .typing { align-self: flex-start; display: none; }
    .typing .msg-bubble { background: #2a2010; border: 0.5px solid #3a2e1a; padding: 12px 16px; display: flex; gap: 4px; align-items: center; border-bottom-left-radius: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #c8a84a; opacity: 0.4; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }

    .suggestions { padding: 0 16px 8px; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
    .suggestion-btn { background: #2a2010; border: 0.5px solid #4a3820; color: #c8a84a; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 7px 12px; border-radius: 20px; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .suggestion-btn:hover { background: #3a2e18; }

    .error-msg { font-size: 12px; color: #8a5a3a; text-align: center; padding: 4px 16px; display: none; flex-shrink: 0; }

    .input-area { padding: 10px 14px 24px; display: flex; gap: 8px; align-items: center; border-top: 0.5px solid #2e2410; flex-shrink: 0; }
    .chat-input { flex: 1; background: #2a2010; border: 0.5px solid #4a3820; border-radius: 22px; padding: 10px 16px; color: #e8c87a; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; -webkit-appearance: none; }
    .chat-input::placeholder { color: #5a4a2a; }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: #c8a84a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .send-btn:hover { background: #e8c87a; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 17px; height: 17px; }

    .loading-overlay { position: fixed; inset: 0; background: #1a1208; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 10; transition: opacity 0.5s; }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-logo { font-family: 'Playfair Display', serif; font-size: 32px; color: #e8c87a; letter-spacing: 0.05em; }
    .loading-sub { font-size: 11px; color: #5a4a2a; letter-spacing: 0.12em; text-transform: uppercase; }
    .loading-bar { width: 100px; height: 1px; background: #2a2010; overflow: hidden; }
    .loading-bar-fill { height: 100%; background: #c8a84a; width: 0%; animation: load 1.4s ease forwards; }
    @keyframes load { to { width: 100%; } }

    #error-screen { position: fixed; inset: 0; background: #1a1208; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #8a7450; font-size: 14px; text-align: center; padding: 20px; }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loader">
    <div class="loading-logo" id="loader-name">Cargando</div>
    <div class="loading-sub">Asistente de menú</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <div id="error-screen">
    <div style="font-size:36px">😕</div>
    <div id="error-msg"></div>
  </div>

  <div class="screen">
    <div class="header">
      <div class="restaurant-name" id="rest-name">—</div>
      <div class="table-badge" id="table-badge">
        <span class="status-dot"></span>Asistente activo
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg typing" id="typing">
        <div class="msg-bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>

    <div class="suggestions" id="suggestions"></div>
    <div class="error-msg" id="api-error"></div>

    <div class="input-area">
      <input class="chat-input" id="chat-input" type="text" placeholder="Preguntame lo que quieras..." />
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1208" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script type="module">
    import { restaurants } from './lib/db.js'

    const BACKEND = 'https://proud-illumination-production-ed01.up.railway.app'
    const TAG_LABELS = { veg: 'Vegetariano', vegan: 'Vegano', celiac: 'Sin TACC', popular: 'Muy pedido', spicy: 'Picante', new: 'Nuevo' }

    const params = new URLSearchParams(location.search)
    const slug = params.get('slug')
    const mesa = params.get('mesa')

    let systemPrompt = ''
    let conversationHistory = []
    let isLoading = false

    async function init() {
      if (!slug) { showError('URL inválida — falta el parámetro slug.'); return }

      let rest
      try {
        rest = await restaurants.getBySlug(slug)
      } catch {
        showError('No se encontró el restaurante "' + slug + '".')
        return
      }

      document.getElementById('loader-name').textContent = rest.name
      document.getElementById('rest-name').textContent = rest.name
      document.title = rest.name + ' — Asistente'

      if (mesa) {
        document.getElementById('table-badge').innerHTML =
          '<span class="status-dot"></span>Mesa ' + mesa + ' · Asistente activo'
      }

      systemPrompt = buildSystemPrompt(rest)
      buildSuggestions(rest)
      addGreeting(rest)

      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden')
      }, 1400)

      document.getElementById('chat-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMessage()
      })
    }

    function showError(msg) {
      document.getElementById('loader').classList.add('hidden')
      document.getElementById('error-msg').textContent = msg
      document.getElementById('error-screen').style.display = 'flex'
    }

    // ─── Menu text builder ────────────────────────────────────────────────────
    function buildMenuText(rest) {
      const cats = (rest.menu_categories || [])
        .filter(c => c.is_visible)
        .sort((a, b) => a.sort_order - b.sort_order)

      return cats.map(cat => {
        const items = (cat.menu_items || [])
          .filter(i => i.is_visible && i.is_available)
          .sort((a, b) => a.sort_order - b.sort_order)
        if (!items.length) return ''
        const lines = items.map(item => {
          const price = '$' + Number(item.price).toLocaleString('es-AR')
          const tags = (item.tags || []).map(t => TAG_LABELS[t]).filter(Boolean).join(', ')
          return '- ' + item.name + ' (' + price + ')'
            + (item.description ? ': ' + item.description : '')
            + (tags ? '. ' + tags + '.' : '')
        }).join('\n')
        return (cat.emoji ? cat.emoji + ' ' : '') + cat.name.toUpperCase() + ':\n' + lines
      }).filter(Boolean).join('\n\n')
    }

    function buildSystemPrompt(rest) {
      const menuText = buildMenuText(rest)
      const location = [rest.address, rest.city].filter(Boolean).join(', ')
      return 'Sos el asistente digital de ' + rest.name
        + (location ? ', un restaurante en ' + location : '') + '.'
        + ' Tu rol es el de un mozo digital amable y conocedor del menú.\n\n'
        + 'REGLAS:\n'
        + '1. Solo respondés preguntas sobre el menú, platos, ingredientes, alérgenos o el restaurante.\n'
        + '2. Si te preguntan algo ajeno al restaurante, decís amablemente que solo podés ayudar con el menú.\n'
        + '3. Nunca inventés platos ni precios. Si algo no figura, decí que consulten al mozo.\n'
        + '4. Tono cálido, informal y porteño. Emojis con moderación.\n'
        + '5. Español rioplatense (vos, che, etc.).\n'
        + '6. Respuestas concisas, máximo 3-4 líneas. Si hay lista, viñetas cortas.\n\n'
        + 'MENÚ DISPONIBLE:\n' + menuText
    }

    function buildSuggestions(rest) {
      const cats = (rest.menu_categories || [])
        .filter(c => c.is_visible)
        .sort((a, b) => a.sort_order - b.sort_order)
        .slice(0, 3)

      const el = document.getElementById('suggestions')
      el.innerHTML = cats.map(cat =>
        '<button class="suggestion-btn" onclick="window.sendSuggestion(\'¿Qué ' + cat.name.toLowerCase() + ' tienen?\')">'
        + (cat.emoji ? cat.emoji + ' ' : '') + cat.name + '</button>'
      ).join('')
        + '<button class="suggestion-btn" onclick="window.sendSuggestion(\'¿Qué opciones veganas tienen?\')">Vegano</button>'
        + '<button class="suggestion-btn" onclick="window.sendSuggestion(\'¿Qué platos son sin TACC?\')">Sin TACC</button>'
        + '<button class="suggestion-btn" onclick="window.sendSuggestion(\'¿Qué me recomendás?\')">Recomendaciones</button>'
    }

    function addGreeting(rest) {
      addMessage('assistant',
        '¡Hola! Bienvenido a ' + rest.name + ' 👋 Soy tu asistente de menú. '
        + 'Puedo ayudarte con los platos, ingredientes, opciones vegetarianas, veganas o aptas para celíacos, y hacerte recomendaciones. '
        + '¿En qué te puedo ayudar?'
      )
    }

    // ─── Chat ─────────────────────────────────────────────────────────────────
    function addMessage(role, text) {
      const messages = document.getElementById('messages')
      const typing = document.getElementById('typing')
      const div = document.createElement('div')
      div.className = 'msg ' + (role === 'user' ? 'user' : 'bot')
      if (role === 'assistant') {
        div.innerHTML = '<div class="msg-label">Asistente</div><div class="msg-bubble">' + text.replace(/\n/g, '<br>') + '</div>'
      } else {
        div.innerHTML = '<div class="msg-bubble">' + text + '</div>'
      }
      messages.insertBefore(div, typing)
      messages.scrollTop = messages.scrollHeight
    }

    function showTyping(show) {
      document.getElementById('typing').style.display = show ? 'flex' : 'none'
      if (show) {
        const messages = document.getElementById('messages')
        messages.scrollTop = messages.scrollHeight
      }
    }

    async function sendMessage() {
      if (isLoading) return
      const input = document.getElementById('chat-input')
      const text = input.value.trim()
      if (!text) return

      input.value = ''
      document.getElementById('suggestions').style.display = 'none'
      addMessage('user', text)
      conversationHistory.push({ role: 'user', content: text })
      isLoading = true
      showTyping(true)

      const errorEl = document.getElementById('api-error')
      errorEl.style.display = 'none'

      let attempts = 0
      while (attempts < 3) {
        try {
          const res = await fetch(BACKEND + '/api/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ system: systemPrompt, messages: conversationHistory, max_tokens: 1000 })
          })

          if (res.status === 529) {
            attempts++
            if (attempts < 3) {
              errorEl.style.display = 'block'
              errorEl.textContent = 'Servidor ocupado, reintentando (' + attempts + '/3)...'
              await new Promise(r => setTimeout(r, 3000))
              continue
            }
          }

          if (!res.ok) throw new Error('Error ' + res.status)

          const data = await res.json()
          const reply = data.content?.[0]?.text || 'No pude procesar tu consulta. ¿Podés repetirla?'
          conversationHistory.push({ role: 'assistant', content: reply })
          showTyping(false)
          addMessage('assistant', reply)
          errorEl.style.display = 'none'
          break
        } catch {
          attempts++
          if (attempts >= 3) {
            showTyping(false)
            addMessage('assistant', 'Ups, tuve un problema técnico. ¿Podés intentarlo de nuevo?')
          } else {
            await new Promise(r => setTimeout(r, 3000))
          }
        }
      }

      isLoading = false
    }

    window.sendMessage = sendMessage
    window.sendSuggestion = function(text) {
      document.getElementById('chat-input').value = text
      sendMessage()
    }

    init()
  </script>
</body>
</html>
